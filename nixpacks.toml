[phases.setup]
nixPkgs = ["python312", "nodejs_20"]
nixLibs = ["zlib"]

[phases.install]
cmds = [
  "python3.12 -m pip install -r backend/requirements.txt",
  "cd frontend && npm install"
]

[phases.build]
cmds = ["cd frontend && npm run build"]

[start]
cmd = "cd backend && python3.12 -m uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}"
