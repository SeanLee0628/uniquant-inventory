databases:
  - name: uniquant-db
    plan: starter
    databaseName: uniquant_inventory
    user: uniquant

services:
  - type: web
    name: uniquant-inventory
    runtime: python
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: NODE_VERSION
        value: "20"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: uniquant-db
          property: connectionString
